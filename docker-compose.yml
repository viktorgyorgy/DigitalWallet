name: digital-wallet

services:
  digitalwallet.host:
    container_name: wallet_api
    image: ${DOCKER_REGISTRY-}digitalwallethost
    build:
      context: .
      dockerfile: src/DigitalWallet.Host/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully
    environment:
      - ConnectionStrings__PostgresConnection
      - ConnectionStrings__MongoConnection
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    networks:
      - wallet-network

  migration-runner:
    build:
      context: .
      dockerfile: src/DigitalWallet.Host/Dockerfile
    container_name: wallet_migrations
    working_dir: /app
    environment:
      - ConnectionStrings__PostgresConnection
      - ConnectionStrings__MongoConnection
    entrypoint: [ "dotnet", "DigitalWallet.Host.dll", "--migrate" ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wallet-network


  read-worker:
    container_name: wallet_read_worker
    image: ${DOCKER_REGISTRY-}digitalwalletreadworker
    build:
      context: .
      dockerfile: src/DigitalWallet.ReadWorker/Dockerfile
    environment:
      - ENV_NAME
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - ConnectionStrings__MongoConnection
    depends_on:
      mongodb:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      debezium-setup:
        condition: service_completed_successfully
    networks:
      - wallet-network

  gateway:
    image: nginx:alpine
    container_name: wallet_gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/00_base.conf:/etc/nginx/conf.d/00_base.conf:ro
      - ./infra/nginx/gateway.conf:/etc/nginx/conf.d/api.conf:ro
    command: /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    networks:
      - wallet-network
  
  # --- WRITE SIDE: POSTGRES (with Debezium support) ---
  postgres:
    image: debezium/postgres:16
    container_name: wallet_postgres
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wallet-network
  
  

  # --- MESSAGE BUS: REDPANDA (Kafka API) ---
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: wallet_redpanda
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --set redpanda.auto_create_topics_enabled=true
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "health", "--exit-when-healthy" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - wallet-network

  # --- READ SIDE: MONGODB ---
  mongodb:
    image: mongo:latest
    container_name: wallet_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      wallet-network:
        aliases:
          - mongo
  
  debezium:
    image: debezium/connect:2.7.3.Final
    container_name: wallet_debezium
    environment:
      - BOOTSTRAP_SERVERS=redpanda:29092
      - GROUP_ID=wallet_connect_group
      - CONFIG_STORAGE_TOPIC=debezium_configs
      - OFFSET_STORAGE_TOPIC=debezium_offsets
      - STATUS_STORAGE_TOPIC=debezium_status
      - KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - KEY_CONVERTER_SCHEMAS_ENABLE=false
      - VALUE_CONVERTER_SCHEMAS_ENABLE=false
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/connectors" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - debezium_data:/kafka/data
      - debezium_config:/kafka/config
      - debezium_logs:/kafka/logs
    depends_on:
      redpanda:
          condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - wallet-network

  redpanda-setup:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: wallet_redpanda_setup
    volumes:
      - ./infra/redpanda/create-topics.sh:/usr/local/bin/create-topics.sh:ro
    environment:
      - ENV_NAME=${ENV_NAME}
    entrypoint: [ "/bin/bash", "/usr/local/bin/create-topics.sh" ]
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - wallet-network
  
  debezium-setup:
    image: alpine:latest
    container_name: wallet_debezium_setup
    depends_on:
      debezium:
        condition: service_healthy
      redpanda-setup:
        condition: service_completed_successfully
      migration-runner:
        condition: service_completed_successfully
    volumes:
      - ./infra/debezium/templates:/templates:ro
      - ./infra/debezium/register-connectors.sh:/usr/local/bin/register-connectors.sh:ro
    environment:
      - POSTGRES_HOST
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - ENV_NAME
    entrypoint: [ "/bin/sh", "/usr/local/bin/register-connectors.sh" ]
    networks:
      - wallet-network

volumes:
  postgres_data:
  mongo_data:
  mongo_config:
  redpanda_data:
  debezium_data:
  debezium_config:
  debezium_logs:

networks:
  wallet-network:
    driver: bridge