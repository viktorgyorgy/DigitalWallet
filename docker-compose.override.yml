services:
  digitalwallet.host:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro

  gateway:
    volumes:
      - ./infra/nginx/dev-tools.conf:/etc/nginx/conf.d/dev-tools.conf:ro
      - ./infra/nginx/tools.html:/usr/share/nginx/html/tools.html:ro
  
  mongo-express:
    image: mongo-express
    container_name: wallet_mongo_ui
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD}
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wallet-network

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: wallet_redpanda_ui
    environment:
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - wallet-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: wallet_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@wallet.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wallet-network

  debezium-ui:
    image: debezium/debezium-ui:latest
    container_name: wallet_debezium_ui
    environment:
      - KAFKA_CONNECT_URIS=http://debezium:8083
    depends_on:
      debezium:
        condition: service_healthy
    networks:
      - wallet-network
  
volumes:
  pgadmin_data:
